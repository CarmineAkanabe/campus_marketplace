{% extends 'base.html' %}

{% block content %}
<h1>Edit Profile</h1>
<form method="post" enctype="multipart/form-data" class="card p-3">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a href="{% url 'users:profile' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
