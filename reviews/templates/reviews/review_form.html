{% extends 'base.html' %}

{% block content %}
<div class="form-page">
    <div class="form-panel small">
        <span class="eyebrow">Seller review</span>
        <h1>Review {{ seller.username }}</h1>
        <p class="text-muted">Product: {{ product.name }}</p>
        <form method="post" class="mt-3">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% for error in field.errors %}<div class="invalid-feedback d-block">{{ error }}</div>{% endfor %}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary">Submit review</button>
            <a class="btn btn-secondary" href="{% url 'requestsystem:request_detail' request_id %}">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
