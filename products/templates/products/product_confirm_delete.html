{% extends 'base.html' %}

{% block content %}
<h1>Delete Product</h1>
<p>Are you sure you want to delete <strong>{{ product.name }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a class="btn btn-secondary" href="{% url 'products:product_detail' product.pk %}">Cancel</a>
</form>
{% endblock %}
