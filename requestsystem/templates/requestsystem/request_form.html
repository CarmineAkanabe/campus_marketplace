{% extends 'base.html' %}

{% block content %}
<div class="form-page">
    <div class="form-panel auth-panel">
        <div class="form-aside">
            <span class="eyebrow">Purchase request</span>
            <h2>{{ product.name }}</h2>
            <p>Ask a clear question so the seller can respond quickly.</p>
        </div>
        <div class="form-main">
            <h1>Send Request</h1>
            <p class="text-muted">Product: <strong>{{ product.name }}</strong></p>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="message" class="form-label">Request message</label>
                    <textarea class="form-control" id="message" name="message" rows="5" placeholder="Ask about availability, pickup time, or payment details."></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Send request</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
